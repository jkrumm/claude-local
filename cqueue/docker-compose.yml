services:
  cqueue:
    build: .
    ports:
      - "${CQUEUE_PORT:-7705}:7705"
    volumes:
      - ${PERSONAL_REPOS_PATH}:/repos/personal:rw
      - ${WORK_REPOS_PATH}:/repos/work:rw
    user: "${UID:-501}:${GID:-20}"
    restart: unless-stopped
    environment:
      - PERSONAL_REPOS_PATH=${PERSONAL_REPOS_PATH}
      - WORK_REPOS_PATH=${WORK_REPOS_PATH}
